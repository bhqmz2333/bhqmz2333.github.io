<html>
  <head>
    <meta charset="UTF-8"/>
  </head>
  <body style="margin:0">
    <h1 onclick="x=prompt('恭喜你点到了！获得一次修改文字的机会...', this.innerText);if (x!=null&&x.trim()!='') this.innerText=x;">这只是一个普通的页面...</h1>
    <script>
      function randomColor() {
        return `rgb(${Math.random()*255},${Math.random()*255},${Math.random()*255})`;
      }
      function randomDirection() {
        return ["to right", "to left", "to bottom", "to top"][Math.round(Math.random()*3)]
      }
      function update() {
		let h1 = document.querySelector("h1");
        h1.style.top = Math.random()*(document.body.clientHeight-56);
        h1.style.left = Math.random()*(document.body.clientWidth-56);
        h1.style.fontSize = `${Math.random()*22+10}pt`;
        h1.style.color = randomColor();
        document.body.style.background = `linear-gradient(${randomDirection()},${randomColor()},${randomColor()})`;
      }
      update();
      setInterval(update, 500);
    </script>
    <style>
		body {
		  /*background: linear-gradient(to right, #798741, #126483);*/
		  background: linear-gradient(to right, #57B5DD, #69FF73);
		  width: 100vw;
		  height: 100vh;
		  transition: .3s all ease;
		  overflow: hidden;
		}
		h1 {
		  position: absolute;
		  text-shadow: 1px 1px 3px rgba(0, 0, 0, .3);
		  transition: .3s all ease;
		  cursor: pointer;
		  user-select: none;
		}
    </style>
  </body>
</html>
